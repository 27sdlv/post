{% extends "layout.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<h1>Register</h1>
<form action="/user/register/" method="post">
    {% csrf_token %}
    {% if form.errors %}
        <div class="error-box">
            ⚠️ Registration Failed: Please fix the errors below! (Your password might be too weak, or passwords didn't match).
        </div>
    {% endif %}
    
    {{ form.as_p }}
    
    <button type="submit">Register</button>
</form>
{% endblock %}
