{% extends 'layout.html' %}

{% block content %}
    <section>
        <h1>Edit Post</h1>
        <!-- Note that we still POST to the edit-post url, passing the slug so it knows which post! -->
        <form action="{% url 'posts:edit' slug=post.slug %}" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form }}
            <button type="submit">Save Changes</button>
        </form>
    </section>
{% endblock %}
