{%extends 'layout.html'%}
{% load static %}

{%block title%}
    New Post
{%endblock%}

{%block content%}
    <section>
        <h1>Create a new post</h1>
        <form action="{% url 'posts:new-post' %}" method="post" enctype="multipart/form-data">
            {%csrf_token%}
            {{form.as_p}}
            <button type="submit">Create Post</button>
        </form  >
    </section>
{%endblock%}
